<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/uikit.min.css" />
  <title>RuangNode Monitor</title>
  <script src="js/uikit.min.js"></script>
  <script src="./js/uikit-icons.min.js"></script>
  <script src="./js/lodash.min.js"></script>
  <script type="application/javascript" src="grid.js"></script>
  <script type="application/javascript" src="status.js"></script>
  <link rel="icon" href="favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:         #07090f;
      --bg2:        #0d1117;
      --bg3:        #141923;
      --border:     rgba(255,255,255,0.06);
      --border2:    rgba(255,255,255,0.10);
      --text:       #e2e8f0;
      --text-muted: #64748b;
      --text-dim:   #94a3b8;
      --accent:     #6366f1;
      --accent2:    #818cf8;
      --green:      #22c55e;
      --yellow:     #f59e0b;
      --red:        #ef4444;
      --blue:       #3b82f6;
    }

    body.light-mode {
      --bg:         #f8fafc;
      --bg2:        #f1f5f9;
      --bg3:        #e2e8f0;
      --border:     rgba(0,0,0,0.07);
      --border2:    rgba(0,0,0,0.12);
      --text:       #1e293b;
      --text-muted: #64748b;
      --text-dim:   #475569;
    }

    html, body {
      background: var(--bg) !important;
      color: var(--text) !important;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0; padding: 0;
    }

    /* Override UIKit backgrounds */
    .uk-background-secondary,
    body.uk-background-secondary {
      background-color: var(--bg) !important;
      color: var(--text) !important;
    }
    .uk-background-default,
    body.uk-background-default {
      background-color: var(--bg) !important;
      color: var(--text) !important;
    }

    /* ── Header ─────────────────────────────────────────── */
    .rn-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .rn-brand { display: flex; align-items: center; gap: 10px; }

    .rn-logo-mark {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; color: #fff;
      box-shadow: 0 0 16px rgba(99,102,241,0.35);
    }

    .rn-brand-text { }
    .rn-logo {
      font-size: 15px; font-weight: 800; letter-spacing: -0.3px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1;
    }
    .rn-tagline { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    .rn-header-right { display: flex; align-items: center; gap: 10px; }

    .rn-live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
      padding: 4px 10px; border-radius: 20px;
    }
    .rn-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .rn-live { font-size: 10px; color: var(--green); font-weight: 700; letter-spacing: .08em; }

    .rn-filter-group { display: flex; gap: 4px; }
    .rn-filter {
      font-size: 11px; font-weight: 600; cursor: pointer;
      background: none; border: 1px solid var(--border2);
      color: var(--text-muted); padding: 5px 14px; border-radius: 20px; transition: .18s;
    }
    .rn-filter:hover { border-color: var(--accent); color: var(--accent2); }
    .rn-filter.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .rn-btn {
      font-size: 11px; color: var(--text-muted); cursor: pointer;
      background: none; border: 1px solid var(--border2);
      padding: 5px 12px; border-radius: 20px; transition: .18s;
    }
    .rn-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Summary stats ────────────────────────────────── */
    .rn-stats {
      display: flex; gap: 12px;
      padding: 16px 28px 0;
    }

    .rn-stat {
      flex: 1; min-width: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
    }

    .rn-stat-icon {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .rn-stat-icon.green { background: rgba(34,197,94,.1); }
    .rn-stat-icon.blue  { background: rgba(99,102,241,.1); }
    .rn-stat-icon.yellow{ background: rgba(245,158,11,.1); }
    .rn-stat-icon.red   { background: rgba(239,68,68,.1); }

    .rn-stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
    .rn-stat-value { font-size: 22px; font-weight: 800; line-height: 1.1; color: var(--text); margin-top: 2px; }
    .rn-stat-sub   { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* ── Canvas ───────────────────────────────────────── */
    #canvasDiv {
      padding: 16px 0 0;
      border-bottom: 1px solid var(--border);
      margin-top: 16px;
    }
    #canvasDiv > div { padding: 0 28px; }
    #legendContainer { text-align: center; padding: 8px 0 12px; }

    /* ── Main section ─────────────────────────────────── */
    .rn-main { padding: 20px 28px 28px; }

    .rn-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .rn-section-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .rn-section-title::before {
      content: '';
      display: inline-block; width: 3px; height: 14px;
      background: var(--accent); border-radius: 2px;
    }

    /* ── Table ────────────────────────────────────────── */
    #tableDiv { padding: 0 !important; background: transparent !important; }

    .rn-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 5px;
    }

    .rn-table thead th {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .09em;
      color: var(--text-muted); padding: 0 16px 6px;
      text-align: left; white-space: nowrap;
    }

    .rn-table tbody tr {
      background: var(--bg2);
      transition: background .15s, transform .12s;
      position: relative;
    }
    .rn-table tbody tr:hover {
      background: var(--bg3) !important;
      transform: translateY(-1px);
    }

    .rn-table tbody td {
      padding: 13px 16px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .rn-table tbody td:first-child {
      border-left: 1px solid var(--border);
      border-radius: 10px 0 0 10px;
      width: 40px;
      border-left: 3px solid transparent;
    }
    .rn-table tbody td:last-child {
      border-right: 1px solid var(--border);
      border-radius: 0 10px 10px 0;
    }

    /* Row accent color by status — set via data-status attribute */
    tr[data-status="bonded"] td:first-child   { border-left-color: var(--green) !important; }
    tr[data-status="jailed"] td:first-child    { border-left-color: var(--yellow) !important; }
    tr[data-status="tombstoned"] td:first-child{ border-left-color: var(--red) !important; }
    tr[data-status="inactive"] td:first-child  { border-left-color: var(--text-muted) !important; }

    .rn-chain-name { font-weight: 700; font-size: 13px; letter-spacing: -.2px; }
    .rn-chain-id   { font-size: 10px; color: var(--text-muted); font-family: 'Cascadia Code', 'Fira Code', monospace; margin-top: 2px; }
    .rn-height     { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; color: var(--text-dim); }

    .rn-moniker { font-size: 12px; color: var(--text-dim); font-weight: 500; }

    .rn-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
      letter-spacing: .03em;
    }
    .rn-badge-green  { background: rgba(34,197,94,.1);  color: #22c55e; border: 1px solid rgba(34,197,94,.18); }
    .rn-badge-red    { background: rgba(239,68,68,.1);   color: #ef4444; border: 1px solid rgba(239,68,68,.18); }
    .rn-badge-yellow { background: rgba(245,158,11,.1);  color: #f59e0b; border: 1px solid rgba(245,158,11,.18); }
    .rn-badge-gray   { background: rgba(100,116,139,.1); color: #94a3b8; border: 1px solid rgba(100,116,139,.18); }

    .rn-uptime-pct    { font-size: 13px; font-weight: 800; }
    .rn-uptime-bar    { width: 90px; height: 3px; background: rgba(255,255,255,0.07); border-radius: 3px; margin: 5px 0 3px; overflow: hidden; }
    body.light-mode .rn-uptime-bar { background: rgba(0,0,0,0.1); }
    .rn-uptime-fill   { height: 100%; border-radius: 3px; background: var(--green); transition: width .5s; }
    .rn-uptime-fill.warn   { background: var(--yellow); }
    .rn-uptime-fill.danger { background: var(--red); }
    .rn-uptime-detail { font-size: 10px; color: var(--text-muted); font-family: monospace; }

    .rn-nodes      { font-size: 12px; font-weight: 700; }
    .rn-nodes-ok   { color: var(--green); }
    .rn-nodes-warn { color: var(--yellow); }

    .rn-alert-icon { color: var(--yellow); }

    /* ── Log panel ─────────────────────────────────────── */
    #logContainer {
      margin-top: 20px;
      border: 1px solid var(--border) !important;
      border-radius: 14px !important;
      overflow: hidden;
      background: var(--bg2) !important;
    }

    .rn-log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
    }
    .rn-log-header-left { display: flex; align-items: center; gap: 7px; }
    .rn-log-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 3s infinite; }
    .rn-log-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted); }
    .rn-log-count { font-size: 10px; color: var(--text-muted); font-family: monospace; }

    #logs {
      display: block !important;
      padding: 12px 18px !important;
      font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace !important;
      font-size: 11.5px !important; line-height: 1.8 !important;
      height: 200px !important; overflow-y: auto !important;
      background: transparent !important;
      resize: vertical; border: none; width: 100%; outline: none;
      color: var(--text-dim);
    }

    /* ── Footer ────────────────────────────────────────── */
    .rn-footer {
      text-align: center; padding: 24px; font-size: 11px; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
    .rn-footer a { color: var(--text-muted); text-decoration: none; transition: color .15s; }
    .rn-footer a:hover { color: var(--text); }

    /* ── Scrollbar ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }

    /* ── Animations ────────────────────────────────────── */
    .rn-fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>

<body class="uk-background-secondary uk-light" onload="loadState(); legend()">

<!-- Header -->
<div class="rn-header">
  <div class="rn-brand">
    <div class="rn-logo-mark">R</div>
    <div class="rn-brand-text">
      <div class="rn-logo">RuangNode Monitor</div>
      <div class="rn-tagline">Validator Node Monitoring</div>
    </div>
  </div>
  <div class="rn-header-right">
    <div class="rn-filter-group">
      <button class="rn-filter" id="filter-mainnet" onclick="setFilter('mainnet')">Mainnet</button>
      <button class="rn-filter" id="filter-testnet" onclick="setFilter('testnet')">Testnet</button>
    </div>
    <div class="rn-live-badge">
      <div class="rn-dot"></div>
      <span class="rn-live">LIVE</span>
    </div>
    <button class="rn-btn" onclick="lightMode()">☀ Light</button>
  </div>
</div>

<!-- Summary stats -->
<div class="rn-stats" id="rn-stats">
  <div class="rn-stat">
    <div class="rn-stat-icon blue">🔗</div>
    <div>
      <div class="rn-stat-label">Total Chains</div>
      <div class="rn-stat-value" id="stat-total">—</div>
    </div>
  </div>
  <div class="rn-stat">
    <div class="rn-stat-icon green">✓</div>
    <div>
      <div class="rn-stat-label">Bonded</div>
      <div class="rn-stat-value" id="stat-bonded">—</div>
    </div>
  </div>
  <div class="rn-stat">
    <div class="rn-stat-icon yellow">⚠</div>
    <div>
      <div class="rn-stat-label">Jailed</div>
      <div class="rn-stat-value" id="stat-jailed">—</div>
    </div>
  </div>
  <div class="rn-stat">
    <div class="rn-stat-icon red">!</div>
    <div>
      <div class="rn-stat-label">Alerts</div>
      <div class="rn-stat-value" id="stat-alerts">—</div>
    </div>
  </div>
</div>

<!-- Canvas / block history -->
<div id="canvasDiv" class="uk-width-expand uk-overflow-auto uk-background-secondary">
  <div style="width: 4835px;" class="uk-padding-remove-horizontal">
    <canvas id="canvas" height="20" width="4735"></canvas>
  </div>
  <div id="legendContainer" class="uk-nav-center uk-background-secondary uk-padding-remove">
    <canvas id="legend" height="32" width="700"></canvas>
  </div>
</div>

<!-- Main content -->
<div class="rn-main">
  <div class="rn-section-header">
    <div class="rn-section-title">Validator Status</div>
    <div id="rn-chain-count" style="font-size:11px;color:var(--text-muted)"></div>
  </div>

  <div id="tableDiv" class="uk-padding-small uk-text-small uk-background-secondary uk-overflow-auto">
    <table class="rn-table">
      <thead>
        <tr>
          <th></th>
          <th>Chain</th>
          <th>Height</th>
          <th>Moniker</th>
          <th>Status</th>
          <th>Uptime</th>
          <th>RPC Nodes</th>
        </tr>
      </thead>
      <tbody id="statusTable"></tbody>
    </table>
  </div>

  <div id="logContainer">
    <div class="rn-log-header">
      <div class="rn-log-header-left">
        <div class="rn-log-dot"></div>
        <span class="rn-log-title">System Logs</span>
      </div>
      <span class="rn-log-count" id="rn-log-count"></span>
    </div>
    <pre id="logs"></pre>
  </div>
</div>

<div class="rn-footer">
  <a href="https://ruangnode.com"><strong>RuangNode</strong></a> · Validator Monitor
</div>

</body>
</html>
