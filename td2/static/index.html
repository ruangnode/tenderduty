<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/uikit.min.css" />
  <title>RuangNode Monitor</title>
  <script src="js/uikit.min.js"></script>
  <script src="./js/uikit-icons.min.js"></script>
  <script src="./js/lodash.min.js"></script>
  <script type="application/javascript" src="grid.js"></script>
  <script type="application/javascript" src="status.js"></script>
  <link rel="icon" href="favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body.uk-background-secondary {
      background: #090d1a !important;
      color: #e2e8f0 !important;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body.uk-background-default {
      background: #f8fafc !important;
      color: #1e293b !important;
    }

    /* ── Header ── */
    .rn-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    body.uk-background-default .rn-header {
      background: rgba(0,0,0,0.03);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .rn-logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .rn-tagline { font-size: 11px; color: #64748b; margin-top: 2px; }

    .rn-header-right { display: flex; align-items: center; gap: 12px; }

    .rn-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 6px #22c55e;
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .rn-live { font-size: 11px; color: #22c55e; font-weight: 700; letter-spacing:.06em; }

    .rn-btn {
      font-size: 11px; color: #64748b; cursor: pointer;
      background: none; border: 1px solid rgba(255,255,255,0.1);
      padding: 4px 10px; border-radius: 6px; transition: .2s;
    }

    .rn-btn:hover { border-color: #6366f1; color: #e2e8f0; }

    body.uk-background-default .rn-btn {
      border-color: rgba(0,0,0,0.15); color: #475569;
    }

    /* ── Canvas zone ── */
    #canvasDiv {
      padding: 14px 0 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    body.uk-background-default #canvasDiv {
      border-bottom-color: rgba(0,0,0,0.08);
    }

    #canvasDiv > div { padding: 0 24px; }
    #legendContainer { text-align: center; padding: 8px 0 12px; }

    /* ── Main ── */
    .rn-main { padding: 24px; }

    .rn-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: #64748b; margin-bottom: 14px;
    }

    /* ── Table wrapper ── */
    #tableDiv { padding: 0 !important; background: transparent !important; }

    /* ── Table ── */
    .rn-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
    }

    .rn-table thead th {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: #64748b; padding: 0 16px 6px;
      text-align: left; white-space: nowrap;
    }

    .rn-table tbody tr {
      background: rgba(255,255,255,0.04);
      transition: background .15s;
    }

    body.uk-background-default .rn-table tbody tr {
      background: rgba(0,0,0,0.03);
    }

    .rn-table tbody tr:hover { background: rgba(255,255,255,0.08) !important; }

    body.uk-background-default .rn-table tbody tr:hover {
      background: rgba(0,0,0,0.06) !important;
    }

    .rn-table tbody td {
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      vertical-align: middle;
    }

    body.uk-background-default .rn-table tbody td {
      border-color: rgba(0,0,0,0.07);
    }

    .rn-table tbody td:first-child {
      border-left: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px 0 0 10px; width: 36px;
    }

    body.uk-background-default .rn-table tbody td:first-child {
      border-left-color: rgba(0,0,0,0.07);
    }

    .rn-table tbody td:last-child {
      border-right: 1px solid rgba(255,255,255,0.06);
      border-radius: 0 10px 10px 0;
    }

    body.uk-background-default .rn-table tbody td:last-child {
      border-right-color: rgba(0,0,0,0.07);
    }

    .rn-chain-name { font-weight: 600; font-size: 14px; }
    .rn-chain-id { font-size: 11px; color: #64748b; font-family: monospace; margin-top: 2px; }
    .rn-height { font-family: monospace; font-size: 13px; color: #94a3b8; }

    .rn-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }

    .rn-badge-green { background: rgba(34,197,94,.12); color: #22c55e; border: 1px solid rgba(34,197,94,.2); }
    .rn-badge-red   { background: rgba(239,68,68,.12);  color: #ef4444; border: 1px solid rgba(239,68,68,.2); }
    .rn-badge-yellow{ background: rgba(245,158,11,.12); color: #f59e0b; border: 1px solid rgba(245,158,11,.2); }
    .rn-badge-gray  { background: rgba(100,116,139,.12);color: #94a3b8; border: 1px solid rgba(100,116,139,.2); }

    .rn-uptime-pct { font-size: 14px; font-weight: 700; }
    .rn-uptime-bar {
      width: 100px; height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px; margin: 5px 0 3px; overflow: hidden;
    }

    body.uk-background-default .rn-uptime-bar { background: rgba(0,0,0,0.1); }

    .rn-uptime-fill { height: 100%; border-radius: 2px; background: #22c55e; transition: width .5s; }
    .rn-uptime-fill.warn   { background: #f59e0b; }
    .rn-uptime-fill.danger { background: #ef4444; }
    .rn-uptime-detail { font-size: 10px; color: #64748b; font-family: monospace; }

    .rn-nodes { font-size: 13px; font-weight: 600; }
    .rn-nodes-ok   { color: #22c55e; }
    .rn-nodes-warn { color: #f59e0b; }

    /* ── Log panel ── */
    #logContainer {
      margin-top: 24px;
      border: 1px solid rgba(255,255,255,0.07) !important;
      border-radius: 12px !important;
      overflow: hidden;
      background: rgba(0,0,0,0.3) !important;
    }

    body.uk-background-default #logContainer {
      border-color: rgba(0,0,0,0.1) !important;
      background: rgba(0,0,0,0.04) !important;
    }

    .rn-log-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; color: #64748b;
    }

    body.uk-background-default .rn-log-header {
      border-bottom-color: rgba(0,0,0,0.08);
    }

    .rn-log-dot { width: 6px; height: 6px; border-radius: 50%; background: #6366f1; }

    #logs {
      display: block !important;
      padding: 12px 16px !important;
      font-family: 'Cascadia Code', 'Fira Code', monospace !important;
      font-size: 12px !important; line-height: 1.7 !important;
      height: 220px !important; overflow-y: auto !important;
      background: transparent !important;
      resize: vertical; border: none; width: 100%; outline: none;
    }

    /* ── Footer ── */
    .rn-footer { text-align: center; padding: 20px; font-size: 11px; color: #475569; }
    .rn-footer a { color: #64748b; text-decoration: none; }
    .rn-footer a:hover { color: #94a3b8; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>

<body class="uk-background-secondary uk-light" onload="loadState(); legend()">

<div class="rn-header">
  <div>
    <div class="rn-logo">RuangNode Monitor</div>
    <div class="rn-tagline">Validator Node Monitoring</div>
  </div>
  <div class="rn-header-right">
    <div class="rn-dot"></div>
    <span class="rn-live">LIVE</span>
    <button class="rn-btn" onclick="lightMode()">☀ Light</button>
  </div>
</div>

<div id="canvasDiv" class="uk-width-expand uk-overflow-auto uk-background-secondary">
  <div style="width: 4835px;" class="uk-padding-remove-horizontal">
    <canvas id="canvas" height="20" width="4735"></canvas>
  </div>
  <div id="legendContainer" class="uk-nav-center uk-background-secondary uk-padding-remove">
    <canvas id="legend" height="32" width="700"></canvas>
  </div>
</div>

<div class="rn-main">
  <div class="rn-label">Validator Status</div>

  <div id="tableDiv" class="uk-padding-small uk-text-small uk-background-secondary uk-overflow-auto">
    <table class="rn-table">
      <thead>
        <tr>
          <th></th>
          <th>Chain</th>
          <th>Height</th>
          <th>Moniker</th>
          <th>Status</th>
          <th>Uptime</th>
          <th>RPC Nodes</th>
        </tr>
      </thead>
      <tbody id="statusTable"></tbody>
    </table>
  </div>

  <div id="logContainer">
    <div class="rn-log-header">
      <div class="rn-log-dot"></div>
      System Logs
    </div>
    <pre id="logs"></pre>
  </div>
</div>

<div class="rn-footer">
  <a href="https://ruangnode.com"><strong>RuangNode</strong></a> · Validator Monitor
</div>

</body>
</html>
